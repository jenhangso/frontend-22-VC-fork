    <header class="composer-bar">
      <div class="composer-bar__content">
        <div class="composer-group composer-group--identity">
          <button id="btn">Submit Name</button>
          <input type="text" id="nameField" placeholder="Your name">
        </div>
        

        <div class="composer-group composer-group--options">
          <label for="post-it-color">color</label>
          <input type="color" name="post-it-color" id="post-it-color" value="#000000" />

          <label class="toggle-option" for="uppercaseCheckbox">
            <input type="checkbox" id="uppercaseCheckbox">
            <span>uppercase</span>
          </label>

          <label class="toggle-option" for="italicCheckbox">
            <input type="checkbox" id="italicCheckbox">
            <span>italic</span>
            
          </label>

          <label class="toggle-option" for="boldCheckbox">
            <input type="checkbox" id="boldCheckbox">
            <span>bold</span>
          </label>
          
        </div>

        <div class="composer-group composer-group--actions">
          <label for="themeSelector">Select Theme:</label>
          <div id="google_translate_element"></div>
          <select id="themeSelector">
            <option value="light">Light Theme</option>
            <option value="browser">Based on Browser</option>
            <option value="dark">Dark Theme</option>
          </select>

          <button id="delete-all-btn">Delete All Notes</button>
          <label for="bg-färg">bg-color :</label>
          <input  type="color"  id="colorPicker">

        </div>
      </div>
    </header>

    <div id="content">
      <div id="placement-hint">Press the page to place your note</div>
    </div>

    <div id="message-modal" class="message-modal" aria-hidden="true">
      <div class="message-modal__card" role="dialog" aria-modal="true" aria-labelledby="message-modal-title">
        <h3 id="message-modal-title">Write your message</h3>
        <textarea id="textField" maxlength="200"placeholder="Type your note here..."></textarea>
         <p id="charCount"> 0 / 200</p>
        <div class="message-modal__actions">
          <button id="modal-smiley-btn" type="button">Add Smiley 😊</button>
          <button id="modal-cancel-btn" type="button">Cancel</button>
          <button id="modal-submit-btn" type="button">Place Note</button>
        </div>
      </div>
    </div>

    <section id="hover-fun">
  <h2>Hover Surprise!</h2>
  <p onmouseover="this.innerHTML='🎉 Surprise!'" onmouseout="this.innerHTML='👋 Hover over me!'">
    👋 Hover over me!
  </p>
</section>
